<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agência Objetiva | Gerador de Roteiros</title>

  <!-- CDN Links -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Processando planilha...</p>
  </div>

  <div class="container">
    <header>
      <div class="logo-container">
      </div>
      <p>Roteiros Simplificados</p>
    </header>

    <div class="main-grid">
      <div class="sidebar">
        <div class="drop-zone" id="drop-zone">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <strong>Importar Excel</strong>
          <p>Arraste aqui ou clique para selecionar</p>
          <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls, .csv">
        </div>

        <div id="controls" class="hidden">
          <div id="import-status">
            <p id="status-msg">Aguardando planilha...</p>
          </div>

          <div class="form-group">
            <label for="promoter-select">👤 Agente / Promotor</label>
            <select id="promoter-select">
              <option value="">Selecione um agente</option>
            </select>
          </div>

          <div class="form-group">
            <label for="custom-title">📄 Título do Roteiro</label>
            <input type="text" id="custom-title" value="Roteiro Agência Objetiva">
          </div>

          <!-- NOVO BOTÃO AQUI -->
          <div class="form-group">
            <label for="color-mode">🎨 Modo de Impressão</label>
            <select id="color-mode" class="color-mode-select">
              <option value="color">Colorido (Laranja)</option>
              <option value="bw">Preto e Branco</option>
            </select>
          </div>

          <button id="btn-generate" class="btn btn-primary">
            <svg width="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            Exportar PDF
          </button>

          <button id="btn-debug" class="btn btn-secondary">
            🔍 Ver Dados Brutos
          </button>
        </div>
      </div>

      <div class="preview-container">
        <div id="preview-scroll-container">
          <div id="preview-content">
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p>📊 Importe sua planilha para visualizar o roteiro</p>
              <p style="font-size: 12px; margin-top: 10px;">Formatos suportados: .xlsx, .xls, .csv</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="debug-modal" class="hidden">
    <div class="modal-header">
      <h3>📋 Inspeção de Dados Brutos</h3>
      <button onclick="closeDebugModal()" class="btn btn-secondary"
        style="width: auto; padding: 8px 20px;">Fechar</button>
    </div>
    <div id="debug-table-container"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
