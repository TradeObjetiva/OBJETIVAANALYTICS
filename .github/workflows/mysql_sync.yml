name: Sincronização MySQL para Supabase

on:
  schedule:
    # Roda a cada hora (no minuto 0 de toda hora)
    - cron: '0 * * * *'
  # Permite rodar o workflow manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fazer Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Dependências
        run: npm ci || npm install

      - name: Executar Script de Sincronização
        run: node scripts/sync_mysql_to_supabase.js
